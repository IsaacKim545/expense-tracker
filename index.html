<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;overflow:hidden;}
body{height:100%;background:#0f0f12;color:#fff;font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;}
#app{max-width:480px;margin:0 auto;position:relative;height:100%;display:flex;flex-direction:column;}
.view-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:12px;}
input::placeholder{color:rgba(255,255,255,0.2);}
input:focus{border-color:rgba(232,200,114,0.3)!important;outline:none;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:2px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
@keyframes pop{0%{transform:scale(0.96);opacity:0;}100%{transform:scale(1);opacity:1;}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* Tab Bar */
.tab-bar{background:rgba(15,15,18,0.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-around;padding:8px 0 max(8px,env(safe-area-inset-bottom));flex-shrink:0;}
.tab-bar button{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:rgba(255,255,255,0.3);transition:color 0.2s;padding:4px 18px;-webkit-tap-highlight-color:transparent;}
.tab-bar button.active{color:#e8c872;}
.tab-bar button .icon{font-size:20px;line-height:1;}
.tab-bar button .icon.plus{font-size:26px;font-weight:300;}
.tab-bar button .label{font-size:10px;letter-spacing:0.02em;}

/* Month Nav */
.month-nav{display:flex;align-items:center;justify-content:center;gap:20px;padding:20px 0 16px;}
.month-nav .title{font-size:18px;font-weight:600;letter-spacing:-0.02em;}
.nav-btn{background:none;border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:rgba(255,255,255,0.45);cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.15s;-webkit-tap-highlight-color:transparent;}
.nav-btn:active{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.15);}

/* Balance Card */
.balance-card{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);border-radius:20px;padding:24px 22px;margin:0 20px 16px;border:1px solid rgba(232,200,114,0.1);box-shadow:0 8px 32px rgba(0,0,0,0.25);animation:slideUp 0.35s ease;}

.balance-card .amount{font-size:30px;font-weight:700;letter-spacing:-0.03em;font-family:'Outfit',sans-serif;margin-bottom:18px;}
.balance-card .amount.pos{color:#e8c872;}
.balance-card .amount.neg{color:#f87171;}
.balance-card .row{display:flex;gap:12px;}
.mini-card{flex:1;border-radius:12px;padding:12px 14px;}

.mini-card .ml{font-size:10px;margin-bottom:3px;}

.mini-card.inc .mv{color:#22c55e;}
.mini-card.exp .mv{color:#f97316;}

/* Panel */
.panel{background:rgba(255,255,255,0.025);border-radius:16px;padding:18px;margin:0 20px 14px;border:1px solid rgba(255,255,255,0.04);animation:slideUp 0.35s ease;}

.tx-name{font-size:13px;color:rgba(255,255,255,0.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-meta{font-size:10px;color:rgba(255,255,255,0.25);font-family:'Outfit',sans-serif;margin-top:2px;}

.toggle button.a-e{background:rgba(249,115,22,0.13);color:#f97316;}
.toggle button.a-i{background:rgba(34,197,94,0.13);color:#22c55e;}
.f-label{display:block;font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:7px;letter-spacing:0.02em;}
.f-input{width:100%;padding:13px 15px;border-radius:12px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.035);color:#fff;font-size:15px;font-family:'Noto Sans KR',sans-serif;}
.amt-wrap{position:relative;margin-bottom:18px;}
.amt-wrap .pfx{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.25);font-size:17px;font-family:'Outfit',sans-serif;}

.flash{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);border-radius:12px;padding:11px 15px;margin-bottom:14px;color:#22c55e;font-size:12px;animation:fadeIn 0.3s ease;}

/* Date Group */
.dg-h{display:flex;justify-content:space-between;align-items:center;padding:6px 4px;margin-bottom:3px;}

/* Stats */
.bars{display:flex;align-items:flex-end;justify-content:space-around;height:150px;padding:0 2px;border-bottom:1px solid rgba(255,255,255,0.05);}
.bp{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}

.bp .b{width:14px;border-radius:4px 4px 0 0;min-height:2px;transition:height 0.5s ease;}

.ci-item{margin-bottom:14px;}

.prog{width:100%;height:5px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden;}

/* Pie */
.pie-area{display:flex;align-items:center;gap:12px;}

/* Legend */
.legend{display:flex;gap:14px;justify-content:center;margin:6px 0 4px;}

/* Install Banner */
.install-banner{margin:0 20px 14px;padding:14px 18px;background:linear-gradient(135deg,rgba(232,200,114,0.08),rgba(232,200,114,0.03));border:1px solid rgba(232,200,114,0.12);border-radius:14px;display:flex;align-items:center;gap:12px;animation:slideUp 0.4s ease;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.install-banner .ib-icon{font-size:28px;}
.install-banner .ib-text{flex:1;}
.install-banner .ib-title{font-size:13px;font-weight:600;color:rgba(255,255,255,0.85);margin-bottom:2px;}
.install-banner .ib-desc{font-size:11px;color:rgba(255,255,255,0.4);}
.install-banner .ib-btn{background:rgba(232,200,114,0.15);color:#e8c872;border:none;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.ib-close{background:none;border:none;color:rgba(255,255,255,0.2);font-size:18px;cursor:pointer;padding:4px;}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;height:60vh;color:rgba(255,255,255,0.25);font-size:13px;}

/* Toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:12px;z-index:200;animation:fadeIn 0.3s ease;pointer-events:none;}
.toast.err{background:rgba(239,68,68,0.9);color:#fff;}
.toast.ok{background:rgba(34,197,94,0.9);color:#fff;}

.view-content{padding:0 0 16px;}

/* Ad Container */
.ad-wrap{margin:0 20px 14px;border-radius:12px;overflow:hidden;min-height:50px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.03);text-align:center;}
.ad-wrap ins{display:block;}
.ad-wrap .ad-label{font-size:9px;color:rgba(255,255,255,0.15);text-align:right;padding:2px 8px 0;letter-spacing:0.03em;}
</style>

<script>
// ─── Register Service Worker ───
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(() => {});
}

// ─── IndexedDB Storage ───
const DB_NAME = "ExpenseTracker";
const DB_VERSION = 1;
const STORE = "transactions";

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) {
        const store = db.createObjectStore(STORE, { keyPath: "id" });
        store.createIndex("date", "date", { unique: false });
        store.createIndex("type", "type", { unique: false });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

const db = {
  async getAll() {
    const conn = await openDB();
    return new Promise((resolve, reject) => {
      const tx = conn.transaction(STORE, "readonly");
      const req = tx.objectStore(STORE).getAll();
      req.onsuccess = () => { conn.close(); resolve(req.result); };
      req.onerror = () => { conn.close(); reject(req.error); };
    });
  },
  async add(item) {
    const conn = await openDB();
    return new Promise((resolve, reject) => {
      const tx = conn.transaction(STORE, "readwrite");
      tx.objectStore(STORE).add(item);
      tx.oncomplete = () => { conn.close(); resolve(item); };
      tx.onerror = () => { conn.close(); reject(tx.error); };
    });
  },
  async remove(id) {
    const conn = await openDB();
    return new Promise((resolve, reject) => {
      const tx = conn.transaction(STORE, "readwrite");
      tx.objectStore(STORE).delete(id);
      tx.oncomplete = () => { conn.close(); resolve(); };
      tx.onerror = () => { conn.close(); reject(tx.error); };
    });
  }
};

// ═══════════════════════════════════════════════
// ★ Google AdSense 설정 — 아래 두 값만 교체하세요 ★
// ═══════════════════════════════════════════════
// 1. index.html 상단 <script> 태그의 ca-pub-XXXXXXXXXXXXXXXX 을
//    본인의 AdSense 게시자 ID로 교체
// 2. 아래 AD_SLOT을 본인의 광고 단위 ID로 교체
const AD_CLIENT = "ca-pub-XXXXXXXXXXXXXXXX"; // AdSense 게시자 ID
const AD_SLOT   = "XXXXXXXXXX";             // 광고 단위 ID
// ═══════════════════════════════════════════════

function adSlot(format="auto") {
  return `<div class="ad-wrap">
    <div class="ad-label">AD</div>
    <ins class="adsbygoogle"
      style="display:block"
      data-ad-client="${AD_CLIENT}"
      data-ad-slot="${AD_SLOT}"
      data-ad-format="${format}"
      data-full-width-responsive="true"></ins>
  </div>`;
}

function pushAds() {
  try {
    document.querySelectorAll('.adsbygoogle:not([data-adsbygoogle-status])').forEach(() => {
      (adsbygoogle = window.adsbygoogle || []).push({});
    });
  } catch(e) {}
}

// ─── Categories ───
const CATS = {
  income:[
    {id:"salary",label:"급여",icon:"💰",color:"#22c55e"},
    {id:"freelance",label:"부수입",icon:"💼",color:"#10b981"},
    {id:"investment",label:"투자수익",icon:"📈",color:"#14b8a6"},
    {id:"other_income",label:"기타수입",icon:"🎁",color:"#06b6d4"},
  ],
  expense:[
    {id:"food",label:"식비",icon:"🍚",color:"#f97316"},
    {id:"transport",label:"교통",icon:"🚌",color:"#8b5cf6"},
    {id:"housing",label:"주거",icon:"🏠",color:"#ec4899"},
    {id:"shopping",label:"쇼핑",icon:"🛍️",color:"#f43f5e"},
    {id:"entertainment",label:"여가",icon:"🎮",color:"#6366f1"},
    {id:"health",label:"건강",icon:"💊",color:"#14b8a6"},
    {id:"education",label:"교육",icon:"📚",color:"#0ea5e9"},
    {id:"utilities",label:"공과금",icon:"⚡",color:"#eab308"},
    {id:"other_expense",label:"기타",icon:"📦",color:"#94a3b8"},
  ]
};
const ALL=[...CATS.income,...CATS.expense];
const catOf=id=>ALL.find(c=>c.id===id)||{label:id,icon:"📌",color:"#888"};
const fmt=n=>`₩${Math.abs(n).toLocaleString()}`;
const todayStr=()=>new Date().toISOString().slice(0,10);
const mk=d=>d.slice(0,7);
const genId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

// ─── State ───
let S={
  txs:[],tab:"home",
  month:(()=>{const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`;})(),
  form:{type:"expense",cat:"food",amount:"",memo:"",date:todayStr()},
  flash:false,loading:true,
  installPrompt:null,showInstall:false,installDismissed:false,
};

// ─── PWA Install ───
let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  if (!S.installDismissed) { S.showInstall = true; render(); }
});

async function doInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const result = await deferredPrompt.userChoice;
  if (result.outcome === "accepted") { S.showInstall = false; }
  deferredPrompt = null;
  render();
}

function dismissInstall() {
  S.showInstall = false;
  S.installDismissed = true;
  render();
}

// ─── Helpers ───
function shiftMonth(dir){
  const[y,m]=S.month.split("-").map(Number);
  const d=new Date(y,m-1+dir,1);
  S.month=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  render();
}
function monthLabel(){const[y,m]=S.month.split("-").map(Number);return`${y}년 ${m}월`;}

function monthNav(){
  return`<div class="month-nav">
    <button class="nav-btn" onclick="shiftMonth(-1)">‹</button>
    <span class="title">${monthLabel()}</span>
    <button class="nav-btn" onclick="shiftMonth(1)">›</button>
  </div>`;
}

function txRow(t,del=false){
  const c=catOf(t.category);const isI=t.type==="income";
  return`<div class="tx">
    <div class="tx-icon" style="background:${c.color}15">${c.icon}</div>
    <div class="tx-info"><div class="tx-name">${t.memo||c.label}</div><div class="tx-meta">${t.date.replace(/-/g,".")} · ${c.label}</div></div>
    <div class="tx-amt ${isI?"i":"e"}">${isI?"+":"-"}${fmt(t.amount)}</div>
    ${del?`<button class="tx-del" onclick="delTx('${t.id}')">✕</button>`:""}
  </div>`;
}

function svgPie(data,sz=130){
  if(!data.length)return"";
  const r=sz/2,ir=r*0.52,or=r*0.88;let paths="",cum=0;
  const tot=data.reduce((s,d)=>s+d.value,0);
  data.forEach(d=>{
    const f=d.value/tot,g=0.012,s=cum+g/2,e=cum+f-g/2;cum+=f;
    if(f<0.005)return;
    const sa=s*2*Math.PI-Math.PI/2,ea=e*2*Math.PI-Math.PI/2;
    const x1=r+ir*Math.cos(sa),y1=r+ir*Math.sin(sa),x2=r+or*Math.cos(sa),y2=r+or*Math.sin(sa);
    const x3=r+or*Math.cos(ea),y3=r+or*Math.sin(ea),x4=r+ir*Math.cos(ea),y4=r+ir*Math.sin(ea);
    const l=f>0.5?1:0;
    paths+=`<path d="M${x1},${y1}L${x2},${y2}A${or},${or} 0 ${l},1 ${x3},${y3}L${x4},${y4}A${ir},${ir} 0 ${l},0 ${x1},${y1}" fill="${d.color}"/>`;
  });
  return`<svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}">${paths}</svg>`;
}

// ─── Views ───
function installBanner() {
  if (!S.showInstall) return "";
  return `<div class="install-banner" onclick="doInstall()">
    <span class="ib-icon">📲</span>
    <div class="ib-text"><div class="ib-title">홈 화면에 추가</div><div class="ib-desc">앱처럼 바로 실행할 수 있어요</div></div>
    <button class="ib-btn" onclick="event.stopPropagation();doInstall()">설치</button>
    <button class="ib-close" onclick="event.stopPropagation();dismissInstall()">✕</button>
  </div>`;
}

function homeView(){
  const txs=S.txs.filter(t=>mk(t.date)===S.month);
  const inc=txs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const exp=txs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const bal=inc-exp;
  const recent=[...txs].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id)).slice(0,5);

  const ebc={};txs.filter(t=>t.type==="expense").forEach(t=>{ebc[t.category]=(ebc[t.category]||0)+t.amount;});
  const pd=Object.entries(ebc).map(([c,v])=>{const x=catOf(c);return{name:x.label,value:v,color:x.color};}).sort((a,b)=>b.value-a.value);
  
  let pie="";
  if(pd.length){
    const lg=pd.slice(0,5).map(d=>`<div class="pie-item"><div class="pie-dot" style="background:${d.color}"></div><span class="n">${d.name}</span><span class="v">${fmt(d.value)}</span></div>`).join("");
    pie=`<div class="panel"><div class="panel-title">카테고리별 지출</div><div class="pie-area">${svgPie(pd)}<div class="pie-lg">${lg}</div></div></div>`;
  }

  return`<div class="view-content">${monthNav()}
    ${installBanner()}
    <div class="balance-card">
      <div class="sub">이번 달 잔액</div>
      <div class="amount ${bal>=0?"pos":"neg"}">${bal>=0?"+":"-"}${fmt(bal)}</div>
      <div class="row">
        <div class="mini-card inc"><div class="ml">수입</div><div class="mv">+${fmt(inc)}</div></div>
        <div class="mini-card exp"><div class="ml">지출</div><div class="mv">-${fmt(exp)}</div></div>
      </div>
    </div>${adSlot()}${pie}
    <div class="panel"><div class="panel-title">최근 거래</div>
      ${recent.length?recent.map(t=>txRow(t)).join(""):`<div class="empty">아직 거래 내역이 없습니다</div>`}
    </div>
  </div>`;
}

function addView(){
  const f=S.form;
  const cs=CATS[f.type].map(c=>{
    const a=f.cat===c.id;
    return`<button class="cat" style="${a?`border-color:${c.color}50;background:${c.color}12;color:${c.color}`:""}" onclick="setF('cat','${c.id}')">${c.icon} ${c.label}</button>`;
  }).join("");
  return`<div class="form-page">
    <h2>거래 추가</h2>
    ${S.flash?`<div class="flash">✓ 저장되었습니다</div>`:""}
    <div class="toggle">
      <button class="${f.type==="expense"?"a-e":""}" onclick="setF('type','expense')">지출</button>
      <button class="${f.type==="income"?"a-i":""}" onclick="setF('type','income')">수입</button>
    </div>
    <label class="f-label">금액</label>
    <div class="amt-wrap"><span class="pfx">₩</span>
      <input class="f-input" type="text" inputmode="numeric" placeholder="0" value="${f.amount}" oninput="handleAmt(this)">
    </div>
    <label class="f-label">날짜</label>
    <input class="f-input" type="date" value="${f.date}" style="margin-bottom:18px;color-scheme:dark;" onchange="setF('date',this.value)">
    <label class="f-label">카테고리</label>
    <div class="cats">${cs}</div>
    <label class="f-label">메모 (선택)</label>
    <input class="f-input" type="text" placeholder="내용을 입력하세요" value="${f.memo}" style="margin-bottom:24px;" oninput="setFS('memo',this.value)">
    <button class="submit ${f.type==="expense"?"e":"i"}" ${f.amount?"":"disabled"} onclick="submitTx()">
      ${f.type==="expense"?"지출":"수입"} 추가
    </button>
  </div>`;
}

function listView(){
  const txs=S.txs.filter(t=>mk(t.date)===S.month).sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  const grp={};txs.forEach(t=>{if(!grp[t.date])grp[t.date]=[];grp[t.date].push(t);});
  let content="";
  if(!Object.keys(grp).length){content=`<div class="empty" style="padding-top:50px">이 달의 거래 내역이 없습니다</div>`;}
  else{for(const[date,list]of Object.entries(grp)){
    const dt=list.reduce((s,t)=>s+(t.type==="income"?t.amount:-t.amount),0);
    content+=`<div style="margin:0 20px 14px""><div class="dg-h"><span class="d">${date.replace(/-/g,".")}</span><span class="t" style="color:${dt>=0?"rgba(34,197,94,0.55)":"rgba(249,115,22,0.55)"}">${dt>=0?"+":""}${fmt(dt)}</span></div>${list.map(t=>txRow(t,true)).join("")}</div>`;
  }}
  return`<div class="view-content">${monthNav()}${adSlot()}${content}</div>`;
}

function statsView(){
  const[y,m]=S.month.split("-").map(Number);
  const brs=[];let mx=1;
  for(let i=5;i>=0;i--){
    const d=new Date(y,m-1-i,1);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    const mt=S.txs.filter(t=>mk(t.date)===k);
    const ic=mt.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
    const ex=mt.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
    mx=Math.max(mx,ic,ex);brs.push({l:`${d.getMonth()+1}월`,ic,ex});
  }
  const barH=brs.map(b=>{
    const ih=Math.max(2,(b.ic/mx)*120),eh=Math.max(2,(b.ex/mx)*120);
    return`<div class="bp"><div class="bs"><div class="b bi" style="height:${b.ic?ih:2}px;opacity:${b.ic?1:0.15}"></div><div class="b be" style="height:${b.ex?eh:2}px;opacity:${b.ex?1:0.15}"></div></div><span class="bl">${b.l}</span></div>`;
  }).join("");

  const txs=S.txs.filter(t=>mk(t.date)===S.month);
  const tExp=txs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const ebc={};txs.filter(t=>t.type==="expense").forEach(t=>{ebc[t.category]=(ebc[t.category]||0)+t.amount;});
  const bd=Object.entries(ebc).map(([c,v])=>{const x=catOf(c);return{...x,amount:v,pct:tExp>0?((v/tExp)*100).toFixed(1):0};}).sort((a,b)=>b.amount-a.amount);
  let catH="";
  if(!bd.length){catH=`<div class="empty">지출 내역이 없습니다</div>`;}
  else{catH=bd.map(c=>`<div class="ci-item"><div class="ci-top"><div class="ci-l"><span class="ico">${c.icon}</span><span class="lb">${c.label}</span></div><div class="ci-r"><span class="am">${fmt(c.amount)}</span><span class="pc">${c.pct}%</span></div></div><div class="prog"><div class="fill" style="width:${c.pct}%;background:${c.color}"></div></div></div>`).join("");}

  return`<div class="view-content">${monthNav()}
    <div class="panel"><div class="panel-title">최근 6개월 추이</div>
      <div class="legend"><span><span class="dot" style="background:#22c55e"></span>수입</span><span><span class="dot" style="background:#f97316"></span>지출</span></div>
      <div class="bars">${barH}</div>
    </div>
    ${adSlot()}
    <div class="panel"><div class="panel-title">카테고리별 지출 상세</div>${catH}</div>
  </div>`;
}

// ─── Actions ───
function setTab(t){S.tab=t;render();document.querySelector('.view-area')?.scrollTo(0,0);}
function setF(k,v){S.form[k]=v;if(k==="type")S.form.cat=v==="income"?"salary":"food";render();}
function setFS(k,v){S.form[k]=v;}
function handleAmt(el){const r=el.value.replace(/[^0-9]/g,"");S.form.amount=r?parseInt(r).toLocaleString():"";el.value=S.form.amount;}

async function submitTx(){
  const amt=parseInt(S.form.amount.replace(/[^0-9]/g,""),10);
  if(!amt||amt<=0)return;
  const t={id:genId(),type:S.form.type,category:S.form.cat,amount:amt,memo:S.form.memo.trim(),date:S.form.date,createdAt:new Date().toISOString()};
  try{
    await db.add(t);S.txs.push(t);
    S.form.amount="";S.form.memo="";S.flash=true;render();
    setTimeout(()=>{S.flash=false;render();},1300);
  }catch(e){showToast(e.message,"err");}
}

async function delTx(id){
  try{await db.remove(id);S.txs=S.txs.filter(t=>t.id!==id);render();}
  catch(e){showToast(e.message,"err");}
}

function showToast(msg,type="err"){
  const el=document.createElement("div");el.className=`toast ${type}`;el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2200);
}

// ─── Render ───
function render(){
  const tabs=[
    {id:"home",l:"홈",i:"◉",c:"icon"},
    {id:"add",l:"추가",i:"＋",c:"icon plus"},
    {id:"list",l:"내역",i:"☰",c:"icon"},
    {id:"stats",l:"통계",i:"◐",c:"icon"},
  ];
  const tb=`<nav class="tab-bar">${tabs.map(t=>
    `<button class="${S.tab===t.id?"active":""}" onclick="setTab('${t.id}')"><span class="${t.c}">${t.i}</span><span class="label">${t.l}</span></button>`
  ).join("")}</nav>`;

  let view="";
  switch(S.tab){
    case"home":view=homeView();break;
    case"add":view=addView();break;
    case"list":view=listView();break;
    case"stats":view=statsView();break;
  }
  document.getElementById("app").innerHTML=`<div class="view-area">${view}</div>${tb}`;
  setTimeout(pushAds, 100);
}

// ─── Init ───
(async()=>{
  try{S.txs=await db.getAll();}catch(e){showToast("데이터 로드 실패","err");}
  S.loading=false;render();
})();
</script>
</body>
</html>
