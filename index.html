<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="가계부">
<meta name="description" content="수입·지출을 간편하게 관리하는 가계부 앱">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<title>가계부</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================
   Reset & Base
   ============================ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ── Dark Theme (default) ── */
:root {
  --bg: #0f0f12;
  --bg2: rgba(255,255,255,0.025);
  --text: #fff;
  --text-s: rgba(255,255,255,0.85);
  --text-m: rgba(255,255,255,0.6);
  --text-w: rgba(255,255,255,0.4);
  --text-ww: rgba(255,255,255,0.25);
  --text-www: rgba(255,255,255,0.15);
  --border: rgba(255,255,255,0.05);
  --border2: rgba(255,255,255,0.08);
  --card-bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  --card-border: rgba(232,200,114,0.1);
  --input-bg: rgba(255,255,255,0.035);
  --input-border: rgba(255,255,255,0.07);
  --tab-bg: rgba(15,15,18,0.96);
  --tab-text: rgba(255,255,255,0.3);
  --tab-active: #e8c872;
  --accent: #e8c872;
  --inc: #22c55e;
  --inc-bg: rgba(34,197,94,0.08);
  --inc-text: rgba(34,197,94,0.65);
  --exp: #f97316;
  --exp-bg: rgba(249,115,22,0.08);
  --exp-text: rgba(249,115,22,0.65);
  --neg: #f87171;
  --tx-bg: rgba(255,255,255,0.015);
  --tx-border: rgba(255,255,255,0.03);
  --toggle-bg: rgba(255,255,255,0.035);
  --placeholder: rgba(255,255,255,0.2);
  --focus-border: rgba(232,200,114,0.3);
  --scrollbar: rgba(255,255,255,0.06);
  --toast-err: rgba(239,68,68,0.9);
  --toast-ok: rgba(34,197,94,0.9);
  --edit-bg: rgba(232,200,114,0.04);
  --edit-border: rgba(232,200,114,0.12);
  --date-scheme: dark;
}

/* ── Light Theme ── */
[data-theme="light"] {
  --bg: #f5f5f7;
  --bg2: rgba(0,0,0,0.03);
  --text: #1a1a2e;
  --text-s: rgba(0,0,0,0.85);
  --text-m: rgba(0,0,0,0.6);
  --text-w: rgba(0,0,0,0.4);
  --text-ww: rgba(0,0,0,0.25);
  --text-www: rgba(0,0,0,0.12);
  --border: rgba(0,0,0,0.06);
  --border2: rgba(0,0,0,0.1);
  --card-bg: linear-gradient(135deg, #e8edf5 0%, #dce3f0 100%);
  --card-border: rgba(180,160,100,0.2);
  --input-bg: rgba(0,0,0,0.03);
  --input-border: rgba(0,0,0,0.1);
  --tab-bg: rgba(245,245,247,0.96);
  --tab-text: rgba(0,0,0,0.3);
  --tab-active: #b8860b;
  --accent: #b8860b;
  --inc: #16a34a;
  --inc-bg: rgba(22,163,74,0.08);
  --inc-text: rgba(22,163,74,0.7);
  --exp: #ea580c;
  --exp-bg: rgba(234,88,12,0.08);
  --exp-text: rgba(234,88,12,0.7);
  --neg: #dc2626;
  --tx-bg: rgba(0,0,0,0.015);
  --tx-border: rgba(0,0,0,0.05);
  --toggle-bg: rgba(0,0,0,0.04);
  --placeholder: rgba(0,0,0,0.25);
  --focus-border: rgba(180,160,100,0.4);
  --scrollbar: rgba(0,0,0,0.08);
  --toast-err: rgba(220,38,38,0.9);
  --toast-ok: rgba(22,163,74,0.9);
  --edit-bg: rgba(180,160,100,0.06);
  --edit-border: rgba(180,160,100,0.2);
  --date-scheme: light;
}

html {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.3s, color 0.3s;
}

body {
  background: var(--bg);
  overflow-x: hidden;
  transition: background 0.3s;
}

#app {
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 76px;
}

input::placeholder { color: var(--placeholder); }
input:focus { border-color: var(--focus-border) !important; outline: none; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 2px; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============================
   Tab Bar (화면 하단 고정)
   ============================ */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 9999;
  background: var(--tab-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  transition: background 0.3s;
}
.tab-bar-inner {
  max-width: 480px;
  margin: 0 auto;
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
}
.tab-btn {
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  color: var(--tab-text);
  transition: color 0.2s;
  padding: 4px 18px;
}
.tab-btn.active { color: var(--tab-active); }
.tab-btn .icon { font-size: 20px; line-height: 1; }
.tab-btn .icon.plus { font-size: 26px; font-weight: 300; }
.tab-btn .label { font-size: 10px; letter-spacing: 0.02em; }

/* ============================
   Month Navigation
   ============================ */
.month-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 20px 0 16px;
}
.month-nav .title {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.nav-btn {
  background: none;
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text-w);
  cursor: pointer;
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.15s;
}
.nav-btn:active {
  background: var(--bg2);
  border-color: var(--text-ww);
}

/* ============================
   Balance Card
   ============================ */
.balance-card {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 24px 22px;
  margin: 0 20px 16px;
  border: 1px solid var(--card-border);
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  animation: slideUp 0.35s ease;
  transition: background 0.3s, border-color 0.3s;
}
.balance-card .sub {
  font-size: 11px;
  color: var(--text-w);
  margin-bottom: 6px;
}
.balance-card .amount {
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.03em;
  font-family: 'Outfit', sans-serif;
  margin-bottom: 18px;
}
.balance-card .amount.pos { color: var(--accent); }
.balance-card .amount.neg { color: var(--neg); }
.balance-card .row { display: flex; gap: 12px; }
.mini-card { flex: 1; border-radius: 12px; padding: 12px 14px; }
.mini-card.inc { background: var(--inc-bg); }
.mini-card.exp { background: var(--exp-bg); }
.mini-card .ml { font-size: 10px; margin-bottom: 3px; }
.mini-card.inc .ml { color: var(--inc-text); }
.mini-card.exp .ml { color: var(--exp-text); }
.mini-card .mv { font-size: 16px; font-weight: 600; font-family: 'Outfit', sans-serif; }
.mini-card.inc .mv { color: var(--inc); }
.mini-card.exp .mv { color: var(--exp); }

/* ============================
   Panel
   ============================ */
.panel {
  background: var(--bg2);
  border-radius: 16px;
  padding: 18px;
  margin: 0 20px 14px;
  border: 1px solid var(--border);
  animation: slideUp 0.35s ease;
  transition: background 0.3s, border-color 0.3s;
}
.panel-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-m);
  margin-bottom: 12px;
}
.empty {
  text-align: center;
  padding: 36px 0;
  color: var(--text-ww);
  font-size: 13px;
}

/* ============================
   Transaction Row
   ============================ */
.tx {
  display: flex; align-items: center; gap: 11px; padding: 12px 14px;
  background: var(--tx-bg); border-radius: 12px; margin-bottom: 5px;
  border: 1px solid var(--tx-border); transition: background 0.3s;
}
.tx:active { background: var(--bg2); }
.tx-icon { width: 38px; height: 38px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.tx-info { flex: 1; min-width: 0; }
.tx-name { font-size: 13px; color: var(--text-s); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-meta { font-size: 10px; color: var(--text-ww); font-family: 'Outfit', sans-serif; margin-top: 2px; }
.tx-amt { font-size: 14px; font-weight: 600; font-family: 'Outfit', sans-serif; flex-shrink: 0; }
.tx-amt.i { color: var(--inc); }
.tx-amt.e { color: var(--exp); }
.tx-del { background: none; border: none; cursor: pointer; color: var(--text-www); font-size: 15px; padding: 6px; transition: color 0.15s; }
.tx-del:active { color: var(--text-m); }
.tx-edit { background: none; border: none; cursor: pointer; color: var(--text-www); font-size: 15px; padding: 6px; transition: color 0.15s; }
.tx-edit:active { color: var(--accent); }
.tx-editing { border-color: var(--edit-border) !important; background: var(--edit-bg) !important; }

.edit-panel {
  margin: 0 20px 14px; padding: 18px; background: var(--edit-bg);
  border: 1px solid var(--edit-border); border-radius: 16px; animation: fadeIn 0.2s ease;
}
.edit-panel h3 { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 14px; }
.edit-row { display: flex; gap: 8px; margin-bottom: 10px; }
.edit-row .f-input { flex: 1; }
.edit-actions { display: flex; gap: 8px; margin-top: 14px; }
.edit-save { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 600; background: var(--edit-border); color: var(--accent); }
.edit-cancel { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border2); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 600; background: transparent; color: var(--text-w); }

.form-page { padding: 20px 20px 24px; animation: fadeIn 0.2s ease; }
.form-page h2 { font-size: 20px; font-weight: 700; margin-bottom: 22px; }
.toggle { display: flex; background: var(--toggle-bg); border-radius: 12px; padding: 3px; margin-bottom: 18px; border: 1px solid var(--border); }
.toggle button { flex: 1; padding: 11px; border-radius: 10px; border: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 600; background: transparent; color: var(--tab-text); transition: all 0.2s; }
.toggle button.a-e { background: var(--exp-bg); color: var(--exp); }
.toggle button.a-i { background: var(--inc-bg); color: var(--inc); }
.f-label { display: block; font-size: 11px; color: var(--text-w); margin-bottom: 7px; }
.f-input { width: 100%; padding: 13px 15px; border-radius: 12px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text); font-size: 15px; font-family: 'Noto Sans KR', sans-serif; transition: background 0.3s, border-color 0.3s, color 0.3s; }
.amt-wrap { position: relative; margin-bottom: 18px; }
.amt-wrap .pfx { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-ww); font-size: 17px; font-family: 'Outfit', sans-serif; }
.amt-wrap input { padding-left: 34px; font-size: 22px; font-weight: 600; font-family: 'Outfit', sans-serif; }
.cats { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 18px; }
.cat { padding: 7px 13px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg2); color: var(--text-w); cursor: pointer; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; display: flex; align-items: center; gap: 5px; transition: all 0.12s; }
.submit { width: 100%; padding: 15px; border-radius: 14px; border: none; cursor: pointer; color: #fff; font-size: 15px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; transition: opacity 0.2s; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
.submit:disabled { opacity: 0.35; box-shadow: none; cursor: default; }
.submit.e { background: linear-gradient(135deg, #f97316, #ea580c); }
.submit.i { background: linear-gradient(135deg, #22c55e, #16a34a); }
.flash { background: var(--inc-bg); border: 1px solid rgba(34,197,94,0.2); border-radius: 12px; padding: 11px 15px; margin-bottom: 14px; color: var(--inc); font-size: 12px; animation: fadeIn 0.3s ease; }

.date-group { margin: 0 20px 14px; }
.dg-h { display: flex; justify-content: space-between; align-items: center; padding: 6px 4px; margin-bottom: 3px; }
.dg-h .d { font-size: 12px; color: var(--text-w); font-family: 'Outfit', sans-serif; }
.dg-h .t { font-size: 11px; font-family: 'Outfit', sans-serif; }

.bars { display: flex; align-items: flex-end; justify-content: space-around; height: 150px; padding: 0 2px; border-bottom: 1px solid var(--border); }
.bp { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
.bp .bs { display: flex; gap: 3px; align-items: flex-end; height: 130px; }
.bp .b { width: 14px; border-radius: 4px 4px 0 0; min-height: 2px; transition: height 0.5s ease; }
.bp .b.bi { background: var(--inc); }
.bp .b.be { background: var(--exp); }
.bp .bl { font-size: 10px; color: var(--text-w); margin-top: 5px; }

.ci-item { margin-bottom: 14px; }
.ci-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
.ci-l { display: flex; align-items: center; gap: 7px; }
.ci-l .ico { font-size: 15px; }
.ci-l .lb { font-size: 12px; color: var(--text-m); }
.ci-r { display: flex; align-items: center; gap: 7px; }
.ci-r .am { font-size: 12px; font-weight: 600; color: var(--text-s); font-family: 'Outfit', sans-serif; }
.ci-r .pc { font-size: 10px; color: var(--text-w); font-family: 'Outfit', sans-serif; }
.prog { width: 100%; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.prog .fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

.pie-area { display: flex; align-items: center; gap: 12px; }
.pie-lg { flex: 1; display: flex; flex-direction: column; gap: 5px; }
.pie-item { display: flex; align-items: center; gap: 7px; font-size: 11px; }
.pie-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.pie-item .n { color: var(--text-m); flex: 1; }
.pie-item .v { color: var(--text-w); font-family: 'Outfit', sans-serif; font-size: 10px; }
.legend { display: flex; gap: 14px; justify-content: center; margin: 6px 0 4px; }
.legend span { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-w); }
.legend .dot { width: 7px; height: 7px; border-radius: 2px; display: inline-block; }

.install-banner { margin: 0 20px 14px; padding: 14px 18px; background: var(--edit-bg); border: 1px solid var(--edit-border); border-radius: 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
.install-banner .ib-icon { font-size: 28px; }
.install-banner .ib-text { flex: 1; }
.install-banner .ib-title { font-size: 13px; font-weight: 600; color: var(--text-s); margin-bottom: 2px; }
.install-banner .ib-desc { font-size: 11px; color: var(--text-w); }
.install-banner .ib-btn { background: var(--edit-border); color: var(--accent); border: none; padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
.ib-close { background: none; border: none; color: var(--text-ww); font-size: 18px; cursor: pointer; padding: 4px; }

.ad-wrap { margin: 0 20px 14px; border-radius: 12px; overflow: hidden; min-height: 50px; max-height: 300px; background: var(--tx-bg); border: 1px solid var(--tx-border); text-align: center; position: relative; z-index: 1; }
.ad-wrap ins { display: block; }
.ad-wrap iframe { max-height: 280px; }
.ad-wrap .ad-label { font-size: 9px; color: var(--text-www); text-align: right; padding: 2px 8px 0; }

.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 10px; font-size: 12px; z-index: 10000; animation: fadeIn 0.3s ease; pointer-events: none; }
.toast.err { background: var(--toast-err); color: #fff; }
.toast.ok { background: var(--toast-ok); color: #fff; }
.loading { display: flex; align-items: center; justify-content: center; height: 60vh; color: var(--text-ww); font-size: 13px; }

/* Theme Toggle Button */
.theme-btn {
  background: none; border: 1px solid var(--border2); border-radius: 8px;
  color: var(--text-w); cursor: pointer; width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
  transition: all 0.15s; position: absolute; right: 20px; top: 22px;
}
.theme-btn:active { background: var(--bg2); }
</style>
</head>

if ("serviceWorker" in navigator) {

// ════════════════════════════════════════
// IndexedDB
// ════════════════════════════════════════
var DB_NAME = "ExpenseTracker";
var DB_VER = 1;
var STORE = "transactions";

function openDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = function(e) {
      var d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        var s = d.createObjectStore(STORE, { keyPath: "id" });
        s.createIndex("date", "date", { unique: false });
        s.createIndex("type", "type", { unique: false });
      }
    };
    req.onsuccess = function() { resolve(req.result); };
    req.onerror = function() { reject(req.error); };
  });
}

var db = {
  getAll: async function() {
    var conn = await openDB();
    return new Promise(function(resolve, reject) {
      var tx = conn.transaction(STORE, "readonly");
      var req = tx.objectStore(STORE).getAll();
      req.onsuccess = function() { conn.close(); resolve(req.result); };
      req.onerror = function() { conn.close(); reject(req.error); };
    });
  },
  add: async function(item) {
    var conn = await openDB();
    return new Promise(function(resolve, reject) {
      var tx = conn.transaction(STORE, "readwrite");
      tx.objectStore(STORE).add(item);
      tx.oncomplete = function() { conn.close(); resolve(item); };
      tx.onerror = function() { conn.close(); reject(tx.error); };
    });
  },
  remove: async function(id) {
    var conn = await openDB();
    return new Promise(function(resolve, reject) {
      var tx = conn.transaction(STORE, "readwrite");
      tx.objectStore(STORE).delete(id);
      tx.oncomplete = function() { conn.close(); resolve(); };
      tx.onerror = function() { conn.close(); reject(tx.error); };
    });
  },
  update: async function(item) {
    var conn = await openDB();
    return new Promise(function(resolve, reject) {
      var tx = conn.transaction(STORE, "readwrite");
      tx.objectStore(STORE).put(item);
      tx.oncomplete = function() { conn.close(); resolve(item); };
      tx.onerror = function() { conn.close(); reject(tx.error); };
    });
  }
};

// ════════════════════════════════════════
// Google AdSense 설정
// ════════════════════════════════════════
// ★ 아래 두 값을 본인의 ID로 교체하세요 ★
// ★ 상단 <script> 태그의 ca-pub-XXXX도 같이 교체 ★
var AD_CLIENT = "ca-pub-9141453275201823";
var AD_SLOT = "XXXXXXXXXX";

function adSlot() {
  // AdSense ID가 설정되지 않으면 빈 문자열 반환 (공간 차지 안 함)
  if (AD_CLIENT.indexOf("XXXX") !== -1 || AD_SLOT.indexOf("XXXX") !== -1) return "";
  return '<div class="ad-wrap">' +
    '<div class="ad-label">AD</div>' +
    '<ins class="adsbygoogle" style="display:block"' +
    ' data-ad-client="' + AD_CLIENT + '"' +
    ' data-ad-slot="' + AD_SLOT + '"' +
    ' data-ad-format="auto"' +
    ' data-full-width-responsive="true"></ins>' +

function svgPie(data, sz) {
  sz = sz || 130;
  if (!data.length) return "";
  var r = sz / 2, ir = r * 0.52, or = r * 0.88;
  var paths = "", cum = 0;
  var tot = 0;
  for (var i = 0; i < data.length; i++) tot += data[i].value;

  for (var i = 0; i < data.length; i++) {
    var d = data[i];
    var f = d.value / tot;
    if (f < 0.005) { cum += f; continue; }
    var g = 0.012;
    var s = cum + g / 2, e = cum + f - g / 2;
    cum += f;
    var sa = s * 2 * Math.PI - Math.PI / 2;
    var ea = e * 2 * Math.PI - Math.PI / 2;
    var x1 = r + ir * Math.cos(sa), y1 = r + ir * Math.sin(sa);
    var x2 = r + or * Math.cos(sa), y2 = r + or * Math.sin(sa);
    var x3 = r + or * Math.cos(ea), y3 = r + or * Math.sin(ea);
    var x4 = r + ir * Math.cos(ea), y4 = r + ir * Math.sin(ea);
    var lg = f > 0.5 ? 1 : 0;
    paths += '<path d="M' + x1 + ',' + y1 + 'L' + x2 + ',' + y2 +
      'A' + or + ',' + or + ' 0 ' + lg + ',1 ' + x3 + ',' + y3 +
      'L' + x4 + ',' + y4 + 'A' + ir + ',' + ir + ' 0 ' + lg + ',0 ' + x1 + ',' + y1 + '" fill="' + d.color + '"/>';
  }
  return '<svg viewBox="0 0 ' + sz + ' ' + sz + '" width="' + sz + '" height="' + sz + '">' + paths + '</svg>';
}

function listView() {
  var txs = S.txs.filter(function(t) { return monthOf(t.date) === S.month; });
  txs.sort(function(a, b) { return b.date.localeCompare(a.date) || b.id.localeCompare(a.id); });

  // Group by date
  var dates = [];
  var groups = {};
  for (var i = 0; i < txs.length; i++) {
    var d = txs[i].date;
    if (!groups[d]) { groups[d] = []; dates.push(d); }
    groups[d].push(txs[i]);
  }

  var content = "";
  if (dates.length === 0) {
    content = '<div class="empty" style="padding-top:50px">이 달의 거래 내역이 없습니다</div>';
  } else {
    for (var i = 0; i < dates.length; i++) {
      var date = dates[i];
      var list = groups[date];
      var dt = 0;
      for (var j = 0; j < list.length; j++) {
        dt += list[j].type === "income" ? list[j].amount : -list[j].amount;
      }
      var dtColor = dt >= 0 ? "rgba(34,197,94,0.55)" : "rgba(249,115,22,0.55)";
      var rows = "";
      for (var j = 0; j < list.length; j++) {
        rows += txRow(list[j], true);
      }
      content += '<div class="date-group">' +
        '<div class="dg-h"><span class="d">' + date.replace(/-/g, ".") + '</span>' +
        '<span class="t" style="color:' + dtColor + '">' + (dt >= 0 ? "+" : "") + fmt(dt) + '</span></div>' +
        rows + '</div>';
    }
  }

  return monthNav() + editPanel() + adSlot() + content;
}

function statsView() {
  var parts = S.month.split("-");
  var y = parseInt(parts[0]), m = parseInt(parts[1]);

  // Bar chart: last 6 months
  var brs = [];
  var mx = 1;
  for (var i = 5; i >= 0; i--) {
    var d = new Date(y, m - 1 - i, 1);
    var k = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
    var ic = 0, ex = 0;
    for (var j = 0; j < S.txs.length; j++) {
      if (monthOf(S.txs[j].date) === k) {
        if (S.txs[j].type === "income") ic += S.txs[j].amount;
        else ex += S.txs[j].amount;
      }
    }
    mx = Math.max(mx, ic, ex);
    brs.push({ label: (d.getMonth() + 1) + "월", ic: ic, ex: ex });
  }

  var barHtml = "";
  for (var i = 0; i < brs.length; i++) {
    var b = brs[i];
    var ih = Math.max(2, (b.ic / mx) * 120);
    var eh = Math.max(2, (b.ex / mx) * 120);
    barHtml += '<div class="bp"><div class="bs">' +
      '<div class="b bi" style="height:' + (b.ic ? ih : 2) + 'px;opacity:' + (b.ic ? 1 : 0.15) + '"></div>' +
      '<div class="b be" style="height:' + (b.ex ? eh : 2) + 'px;opacity:' + (b.ex ? 1 : 0.15) + '"></div>' +
      '</div><span class="bl">' + b.label + '</span></div>';
  }

  // Category breakdown
  var txs = S.txs.filter(function(t) { return monthOf(t.date) === S.month; });
  var tExp = 0;
  var ebc = {};
  for (var i = 0; i < txs.length; i++) {
    if (txs[i].type === "expense") {
      tExp += txs[i].amount;
      ebc[txs[i].category] = (ebc[txs[i].category] || 0) + txs[i].amount;
    }
  }
  var bd = [];
  for (var k in ebc) {
    var c = catOf(k);
    var pct = tExp > 0 ? ((ebc[k] / tExp) * 100).toFixed(1) : "0";
    bd.push({ id: k, icon: c.icon, label: c.label, color: c.color, amount: ebc[k], pct: pct });
  }
  bd.sort(function(a, b) { return b.amount - a.amount; });

  var catHtml = "";
  if (bd.length === 0) {
    catHtml = '<div class="empty">지출 내역이 없습니다</div>';
  } else {
    for (var i = 0; i < bd.length; i++) {
      var c = bd[i];
      catHtml += '<div class="ci-item"><div class="ci-top">' +
        '<div class="ci-l"><span class="ico">' + c.icon + '</span><span class="lb">' + c.label + '</span></div>' +
        '<div class="ci-r"><span class="am">' + fmt(c.amount) + '</span><span class="pc">' + c.pct + '%</span></div>' +
        '</div><div class="prog"><div class="fill" style="width:' + c.pct + '%;background:' + c.color + '"></div></div></div>';
    }
  }

  return monthNav() +
    '<div class="panel"><div class="panel-title">최근 6개월 추이</div>' +
    '<div class="legend"><span><span class="dot" style="background:#22c55e"></span>수입</span>' +
    '<span><span class="dot" style="background:#f97316"></span>지출</span></div>' +
    '<div class="bars">' + barHtml + '</div></div>' +
    adSlot() +
    '<div class="panel"><div class="panel-title">카테고리별 지출 상세</div>' + catHtml + '</div>';
}

// ════════════════════════════════════════
function setTab(t) {
  S.tab = t;
  S.editId = null;
  render();
  window.scrollTo(0, 0);
}

function setF(k, v) {
  S.form[k] = v;
  if (k === "type") S.form.cat = (v === "income") ? "salary" : "food";
  render();
}

function setFS(k, v) {
  S.form[k] = v;
}

function handleAmt(el) {
  var raw = el.value.replace(/[^0-9]/g, "");
  S.form.amount = raw ? parseInt(raw, 10).toLocaleString() : "";
  el.value = S.form.amount;
  // 버튼 disabled 상태 직접 업데이트 (render 호출하면 포커스 날아감)
  var btn = document.querySelector(".submit");
  if (btn) btn.disabled = !S.form.amount;
}

async function submitTx() {
  var amt = parseInt(S.form.amount.replace(/[^0-9]/g, ""), 10);
  if (!amt || amt <= 0) return;

  var t = {
    id: genId(),
    type: S.form.type,
    category: S.form.cat,
    amount: amt,
    memo: S.form.memo.trim(),
    date: S.form.date,
    createdAt: new Date().toISOString()
  };

  try {
    await db.add(t);
    S.txs.push(t);
    S.form.amount = "";
    S.form.memo = "";
    S.flash = true;
    render();
    setTimeout(function() { S.flash = false; render(); }, 1300);
  } catch(e) {
    showToast(e.message, "err");
  }
}

async function delTx(id) {
  if (!confirm("이 거래를 삭제할까요?")) return;
  try {
    await db.remove(id);
    S.txs = S.txs.filter(function(t) { return t.id !== id; });
    if (S.editId === id) S.editId = null;
    render();
  } catch(e) {
    showToast(e.message, "err");
  }
}

function editTx(id) {
  var tx = null;
  for (var i = 0; i < S.txs.length; i++) {
    if (S.txs[i].id === id) { tx = S.txs[i]; break; }
  }
  if (!tx) return;
  S.editId = id;
  S.editForm = {
    type: tx.type,
    cat: tx.category,
    amount: tx.amount.toLocaleString(),
    memo: tx.memo || "",
    date: tx.date
  };
  render();
}

function cancelEdit() {
  S.editId = null;
  render();
}

function setEF(k, v) {
  S.editForm[k] = v;
  if (k === "type") S.editForm.cat = (v === "income") ? "salary" : "food";
  render();
}

function setEFS(k, v) {
  S.editForm[k] = v;
}

function handleEditAmt(el) {
  var raw = el.value.replace(/[^0-9]/g, "");
  S.editForm.amount = raw ? parseInt(raw, 10).toLocaleString() : "";
  el.value = S.editForm.amount;
  var btn = document.querySelector(".edit-save");
  if (btn) btn.disabled = !S.editForm.amount;
}

async function saveEdit() {
  var amt = parseInt(S.editForm.amount.replace(/[^0-9]/g, ""), 10);
  if (!amt || amt <= 0) return;

  var updated = null;
  for (var i = 0; i < S.txs.length; i++) {
    if (S.txs[i].id === S.editId) {
      S.txs[i].type = S.editForm.type;
      S.txs[i].category = S.editForm.cat;
      S.txs[i].amount = amt;
      S.txs[i].memo = S.editForm.memo.trim();
      S.txs[i].date = S.editForm.date;
      updated = S.txs[i];
      break;
    }
  }

  if (!updated) return;

  try {
    await db.update(updated);
    S.editId = null;
    render();
  } catch(e) {
    showToast(e.message, "err");
  }
}

function showToast(msg, type) {
  var el = document.createElement("div");
  el.className = "toast " + (type || "err");
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 2200);
}

// ════════════════════════════════════════
// Render
// ════════════════════════════════════════
function render() {
  var tabs = [
    { id: "home", label: "홈", icon: "◉", cls: "icon" },
    { id: "add", label: "추가", icon: "＋", cls: "icon plus" },
    { id: "list", label: "내역", icon: "☰", cls: "icon" },
    { id: "stats", label: "통계", icon: "◐", cls: "icon" }
  ];

  var tabHtml = "";
  for (var i = 0; i < tabs.length; i++) {
    var t = tabs[i];
    tabHtml += '<button class="tab-btn' + (S.tab === t.id ? ' active' : '') + '" onclick="setTab(\'' + t.id + '\')">' +
      '<span class="' + t.cls + '">' + t.icon + '</span>' +
      '<span class="label">' + t.label + '</span></button>';
  }
  var tabBar = '<nav class="tab-bar"><div class="tab-bar-inner">' + tabHtml + '</div></nav>';

  var view = "";
  switch (S.tab) {
    case "home": view = homeView(); break;
    case "add": view = addView(); break;
    case "list": view = listView(); break;
    case "stats": view = statsView(); break;
  }

  document.getElementById("app").innerHTML = view + tabBar;
  setTimeout(pushAds, 100);
}

// ════════════════════════════════════════
// Init
// ════════════════════════════════════════
(async function() {
  try {
    S.txs = await db.getAll();
  } catch(e) {
    showToast("데이터 로드 실패", "err");
  }
  render();
})();
</script>
</body>
</html>
